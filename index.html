<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0A0E27">
<title>Enlace a La Consecuente</title>

<!-- ✅ Ruta correcta al manifest -->
<link rel="manifest" href="manifest-enlace.json">

<style>
* {margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI', Roboto, sans-serif;}
body {
  background: linear-gradient(160deg, #05071A, #0F173A, #192459);
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  color:#fff;padding:20px;
}
.contenedor {max-width:420px;width:100%;text-align:center;}

/* 🤖 Logo con movimiento suave */
.logo-tecnico {
  width:160px;height:160px;
  border-radius:50%;
  border:2px solid rgba(0,220,255,0.4);
  box-shadow: 0 0 20px #00E0FF80, 0 0 40px #7B2FFD40;
  margin:0 auto 25px;
  object-fit:cover;
  animation: latidoBrillo 3s ease-in-out infinite alternate,
             subeBaja 6s ease-in-out infinite alternate;
}
@keyframes subeBaja {
  0% { transform: translateY(0) scale(1); }
  100% { transform: translateY(-6px) scale(1.02); }
}
@keyframes latidoBrillo {
  0% { box-shadow: 0 0 20px #00E0FF80, 0 0 40px #7B2FFD40; }
  100% { box-shadow: 0 0 30px #00FFFF, 0 0 60px #9D4EDD; }
}

h1 {
  font-size:26px;
  margin-bottom:8px;
  background:linear-gradient(90deg,#00E0FF,#7B2FFD);
  -webkit-background-clip:text;
  background-clip:text;
  color:transparent;
}
.subtitulo {font-size:16px;color:#B4D6FF;margin-bottom:22px;}

.estado-caja {
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(0,224,255,0.25);
  border-radius:16px;
  padding:16px 20px;
  margin-bottom:24px;
  min-height:70px;
  box-shadow:inset 0 0 15px rgba(0,224,255,0.1);
}
#textoEstado {font-size:17px;line-height:1.5;}

.barras-conect {
  display:flex;gap:7px;justify-content:center;align-items:flex-end;height:40px;margin-bottom:28px;
}
.barra {
  width:8px;
  border-radius:6px;
  background:linear-gradient(#00E0FF,#7B2FFD);
  box-shadow:0 0 10px #00E0FF;
}
.conectada .barra {animation: pulso 1.1s ease infinite alternate;}
.barra:nth-child(2) {animation-delay:0.2s;}
.barra:nth-child(3) {animation-delay:0.4s;}
.barra:nth-child(4) {animation-delay:0.6s;}
.barra:nth-child(5) {animation-delay:0.8s;}
@keyframes pulso {
  from {height:8px;opacity:0.6;}
  to {height:32px;opacity:1;}
}

.btn-play {
  width:70px;height:70px;border-radius:50%;border:none;
  background:linear-gradient(135deg,#0088FF,#7B2FFD);
  box-shadow:0 0 25px #00E0FF80;
  font-size:28px;color:#fff;cursor:pointer;
  transition:transform 0.2s;
}
.btn-play:active {transform:scale(0.94);}

#botonInstalar {
  margin-top:25px;padding:12px 24px;border-radius:30px;border:none;
  background:linear-gradient(90deg,#FFB700,#FFDD00);color:#000;
  font-weight:bold;box-shadow:0 0 15px #FFD70060;
  cursor:pointer;
  font-size:15px;
}
.cartel-chequeo {
  margin-top:20px;font-size:13px;color:#9CE7FF;opacity:0.8;
}
</style>
</head>
<body>

<div class="contenedor">
  <img class="logo-tecnico" src="https://i.imgur.com/Bp36iz0.jpeg" alt="Enlace IA">
  <h1>ENLACE A LA CONSECUENTE</h1>
  <div class="subtitulo">Transmisión Estable · Solo Uso Técnico</div>

  <div class="estado-caja">
    <div id="textoEstado">Listo para conectar<br>hacia La Consecuente</div>
  </div>

  <div class="barras-conect" id="bloqueBarras">
    <div class="barra"></div><div class="barra"></div><div class="barra"></div><div class="barra"></div><div class="barra"></div>
  </div>

  <button class="btn-play" id="btnReproducir">▶</button>
  <br>
  <button id="botonInstalar" style="display:none;">📲 Instalar Enlace</button>
  <div class="cartel-chequeo" id="cartelInfo"></div>

</div>

<!-- ✅ Etiqueta AUDIO CERRADA correctamente -->
<audio id="reproductor" preload="none">

<script>
// 📡 Enlaces definidos
const enlaces = [
  "https://stream.espora.org/enlaceconsecuente1",
  "https://radios.yanapak.org/enlaceconsecuente"
];
let activo = 0;
let reintentando = false;
let deferredPrompt;

const audio = document.getElementById("reproductor");
const textoEstado = document.getElementById("textoEstado");
const bloqueBarras = document.getElementById("bloqueBarras");
const btnReproducir = document.getElementById("btnReproducir");
const cartelInfo = document.getElementById("cartelInfo");
const btnInstalar = document.getElementById("botonInstalar");

// ✅ Detección de instalación corregida
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  btnInstalar.style.display = 'inline-block';
});

btnInstalar.addEventListener('click', async () => {
  if (!deferredPrompt) {
    return alert("ℹ️ Agregar manualmente: Menú ⋮ → Agregar a pantalla de inicio ✅");
  }
  const { outcome } = await deferredPrompt.prompt();
  if (outcome === 'accepted') {
    deferredPrompt = null;
    btnInstalar.style.display = 'none';
  }
});

function cargarEnlace() {
  audio.src = enlaces[activo];
  audio.load();
  textoEstado.innerHTML = activo === 0
    ? "🔄 Conectando señal principal..."
    : "⚠️ Usando enlace de respaldo";
}

audio.addEventListener("error", () => {
  if (!reintentando) {
    reintentando = true;
    if (activo === 0) { activo = 1; setTimeout(cargarEnlace, 1600); }
    setTimeout(() => { audio.play().catch(()=>{}); reintentando = false; }, 2200);
  }
});

audio.addEventListener("playing", () => {
  textoEstado.innerHTML = "✅ ENLACE ESTABLE<br>Transmitiendo hacia La Consecuente";
  bloqueBarras.classList.add("conectada");
  btnReproducir.textContent = "⏸";
  reintentando = false;
});

audio.addEventListener("pause", () => {
  textoEstado.textContent = "Pausado · Listo para iniciar";
  bloqueBarras.classList.remove("conectada");
  btnReproducir.textContent = "▶";
});

setInterval(() => {
  if (activo !== 0 && !audio.paused) {
    textoEstado.innerHTML = "🔍 Probando volver a señal principal...";
    const temp = activo; activo = 0; cargarEnlace();
    audio.play().catch(() => { activo = temp; cargarEnlace(); });
  }
}, 180000);

setInterval(() => {
  if (!audio.paused) {
    cartelInfo.textContent = "✅ Chequeo conexión activa";
    setTimeout(() => cartelInfo.textContent = "", 3500);
  }
}, 120000);

btnReproducir.addEventListener("click", () => {
  if (audio.paused) { cargarEnlace(); audio.play().catch(()=>textoEstado.textContent="Tocá otra vez para confirmar"); }
  else audio.pause();
});

audio.volume = 0.95;
</script>

</body>
</html>
