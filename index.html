<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Radio Consecuente</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" sizes="512x512" href="https://i.imgur.com/Bp36iz0.jpeg">
<meta name="theme-color" content="#07142e">

<style>
    body { 
        background: #07142e; 
        color: #fff; 
        font-family: Arial, sans-serif; 
        display: flex; 
        flex-direction: column; 
        align-items: center; 
        justify-content: center; 
        min-height: 100vh; 
        margin: 0; 
        padding: 20px; 
    }
    .logo { 
        width: 150px; 
        border-radius: 50%; 
        border: 3px solid #00d2ff; 
        margin-bottom: 25px; 
        box-shadow: 0 0 20px rgba(0,210,255,0.4); 
    }
    h1 { 
        margin-bottom: 30px; 
        font-size: 26px; 
        text-transform: uppercase; 
    }
    #btnPlay { 
        background: #00d2ff; 
        color: #000; 
        border: none; 
        padding: 18px 40px; 
        border-radius: 12px; 
        font-weight: bold; 
        font-size: 22px; 
        cursor: pointer; 
        margin: 12px; 
        min-width: 180px; 
        box-shadow: 0 0 15px rgba(0,210,255,0.3);
    }
    #botonInstalar { 
        background: linear-gradient(90deg, #ff9500, #ffcc00); 
        display: none; 
        color: #000; 
        padding: 12px 25px;
        border-radius: 10px;
        font-weight: bold;
        border: none;
        cursor: pointer;
    }
</style>
</head>
<body>

    <img src="https://i.imgur.com/Bp36iz0.jpeg" class="logo" alt="Logo Radio Consecuente">
    <h1>Radio Consecuente</h1>
    
    <button id="btnPlay">▶ PLAY</button>
    <button id="botonInstalar">📲 INSTALAR APP</button>

    <!-- ✅ Etiqueta audio CORRECTA -->
    <audio id="reproductor" preload="auto" crossorigin="anonymous">

    <script>
        // 📡 LAS DOS SEÑALES
        const streams = [
            "https://stream.espora.org/enlaceconsecuente1",   // Principal
            "https://radios.yanapak.org/enlaceconsecuente"     // Respaldo
        ];
        let activo = 0;
        let estaReproduciendo = false;
        let temporizadorSilencio = null;

        const audio = document.getElementById("reproductor");
        const btnPlay = document.getElementById("btnPlay");

        // ⚙️ Función central: cargar y arrancar
        function arrancarTransmision() {
            audio.src = streams[activo];
            audio.load();
            audio.play()
                .then(() => {
                    estaReproduciendo = true;
                    btnPlay.textContent = "⏸ PAUSE";
                })
                .catch(() => {
                    if (estaReproduciendo) {
                        setTimeout(cambiarSeñal, 1000);
                    }
                });
        }

        // 🔄 Cambiar entre señales automáticamente
        function cambiarSeñal() {
            activo = activo === 0 ? 1 : 0;
            arrancarTransmision();
        }

        // 🛡️ DETECCIÓN COMPLETA DE CORTE
        audio.addEventListener("error", cambiarSeñal);
        audio.addEventListener("stalled", cambiarSeñal);
        audio.addEventListener("waiting", cambiarSeñal);

        // Si pasa a pausa sin que lo hagamos nosotros, lo revivimos
        audio.addEventListener("pause", () => {
            if (estaReproduciendo && !audio.ended) {
                clearTimeout(temporizadorSilencio);
                temporizadorSilencio = setTimeout(() => {
                    if (audio.paused) arrancarTransmision();
                }, 800);
            }
        });

        // ⏹️ Solo detener si el usuario aprieta el botón
        btnPlay.addEventListener("click", () => {
            if (!estaReproduciendo) {
                arrancarTransmision();
            } else {
                estaReproduciendo = false;
                audio.pause();
                btnPlay.textContent = "▶ PLAY";
            }
        });

        // 📲 Sistema de instalación SIN CAMBIOS
        let eventoInstalar = null;
        window.addEventListener("beforeinstallprompt", e => {
            e.preventDefault();
            eventoInstalar = e;
            document.getElementById("botonInstalar").style.display = "block";
        });

        document.getElementById("botonInstalar").addEventListener("click", async () => {
            if (eventoInstalar) {
                await eventoInstalar.prompt();
                eventoInstalar = null;
            }
        });

        // 🔁 Cada 3 minutos prueba volver a la principal
        setInterval(() => {
            if (estaReproduciendo && activo !== 0) {
                let guardar = activo;
                activo = 0;
                arrancarTransmision().catch(() => {
                    activo = guardar;
                    arrancarTransmision();
                });
            }
        }, 180000);

    </script>

</body>
</html>
