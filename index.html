<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Consecuente</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { background: #07142e; color: #fff; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow: hidden; }
        .contenedor { width: 90%; max-width: 400px; background: #0a1c3d; padding: 30px; border-radius: 20px; border: 1px solid #00d2ff; text-align: center; box-shadow: 0 0 40px rgba(0,210,255,0.2); }
        .logo { width: 150px; height: 150px; border-radius: 50%; border: 3px solid #00d2ff; margin-bottom: 20px; animation: flotar 3s infinite ease-in-out; }
        @keyframes flotar { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .estado { color: #00d2ff; font-size: 14px; margin-bottom: 20px; height: 20px; font-weight: bold; text-transform: uppercase; }
        .btn-play { background: #00d2ff; border: none; padding: 15px 40px; border-radius: 50px; font-weight: bold; cursor: pointer; color: #07142e; font-size: 16px; width: 100%; margin-bottom: 15px; }
        /* Botón siempre visible */
        .instalar { background: #ffcc00; border: none; padding: 12px 30px; border-radius: 50px; font-weight: bold; cursor: pointer; color: #000; width: 100%; }
    </style>
</head>
<body>
    <div class="contenedor">
        <img src="https://i.imgur.com/Bp36iz0.jpeg" class="logo" alt="Logo">
        <div class="estado" id="status">SISTEMA LISTO</div>
        <button class="btn-play" id="btnPlay">CONECTAR ENLACE</button>
        <button class="instalar" id="botonInstalar">📲 INSTALAR APLICACIÓN</button>
        <audio id="audio" src="https://stream.espora.org/enlaceconsecuente1"></audio>
    </div>

    <script>
        const audio = document.getElementById('audio');
        const btnPlay = document.getElementById('btnPlay');

        btnPlay.addEventListener('click', () => {
            audio.play();
            btnPlay.style.display = 'none';
        });

        let eventoInstalar = null;
        window.addEventListener("beforeinstallprompt", e => {
            eventoInstalar = e;
        });

        document.getElementById("botonInstalar").addEventListener("click", () => {
            if (eventoInstalar) {
                eventoInstalar.prompt();
                eventoInstalar = null;
            } else {
                alert("La aplicación ya está instalada o el navegador no permite la instalación automática. Probá tocando los 3 puntos del navegador y elegí 'Instalar' o 'Agregar a pantalla de inicio'.");
            }
        });
    </script>
</body>
</html>
