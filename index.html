<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Enlace Consecuente</title>
<link rel="icon" sizes="512x512" href="https://i.imgur.com/Bp36iz0.jpeg">
<meta name="theme-color" content="#07142e">

<style>
    * {margin: 0; padding: 0; box-sizing: border-box;}
    body { background: #07142e; color: #fff; font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 25px; text-align: center; }
    .logo { width: 160px; border-radius: 50%; border: 3px solid #00d2ff; margin-bottom: 25px; box-shadow: 0 0 25px rgba(0,210,255,0.4); }
    h1 { font-size: 28px; text-transform: uppercase; background: linear-gradient(90deg, #00d2ff, #7b2ffd); -webkit-background-clip: text; color: transparent; margin-bottom: 10px; }
    
    #estado { color: #00d2ff; font-size: 14px; margin-bottom: 20px; min-height: 20px; font-weight: bold; }
    
    #btnPlay { background: #00d2ff; color: #000; border: none; padding: 18px 40px; border-radius: 12px; font-weight: bold; font-size: 22px; cursor: pointer; box-shadow: 0 0 15px rgba(0,210,255,0.4); transition: transform 0.2s; }
    #btnPlay:active { transform: scale(0.97); }
    
    .footer { margin-top: 40px; font-size: 12px; color: #666; line-height: 1.5; }
</style>
</head>
<body>

    <img src="https://i.imgur.com/Bp36iz0.jpeg" class="logo" alt="Logo">
    <h1>ENLACE CONSECUENTE</h1>
    <div id="estado">Esperando conexión...</div>

    <button id="btnPlay">▶ PLAY</button>

    <div class="footer">
        Todos los derechos reservados. El Vigía.<br>
        Creado por El Vigía. Si querés tu propia aplicación, comunicate al: +54 9 3462 598048 - Argentina
    </div>

    <audio id="reproductor" preload="none" crossorigin="anonymous"></audio>

    <script>
        const streams = [
            "https://stream.espora.org/enlaceconsecuente1",
            "https://radios.yanapak.org/enlaceconsecuente"
        ];
        let activo = 0;
        const audio = document.getElementById("reproductor");
        const btnPlay = document.getElementById("btnPlay");
        const estado = document.getElementById("estado");

        function actualizarEstado(msg) { estado.textContent = "📡 " + msg; }

        function iniciarReproduccion() {
            actualizarEstado("Conectando al servidor " + (activo + 1) + "...");
            audio.src = streams[activo];
            audio.play().then(() => {
                actualizarEstado("Transmitiendo en vivo");
                btnPlay.textContent = "⏸ PAUSA";
            }).catch(() => {
                actualizarEstado("Error, buscando respaldo...");
                cambiarSeñal();
            });
        }

        function cambiarSeñal() {
            activo = activo === 0 ? 1 : 0;
            setTimeout(iniciarReproduccion, 2000);
        }

        audio.addEventListener("error", cambiarSeñal);
        audio.addEventListener("stalled", cambiarSeñal);

        btnPlay.addEventListener("click", () => {
            if (audio.paused) {
                iniciarReproduccion();
            } else {
                audio.pause();
                audio.src = "";
                btnPlay.textContent = "▶ PLAY";
                actualizarEstado("Transmisión detenida");
            }
        });
    </script>
</body>
</html>
