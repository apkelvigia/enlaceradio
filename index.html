<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Radio Consecuente</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" sizes="512x512" href="https://i.imgur.com/Bp36iz0.jpeg">

<style>
    body { background: #07142e; color: #fff; font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
    .logo { width: 150px; border-radius: 50%; border: 3px solid #00d2ff; margin-bottom: 20px; }
    .btn { background: #00d2ff; color: #000; border: none; padding: 15px 30px; border-radius: 10px; font-weight: bold; font-size: 18px; cursor: pointer; margin: 10px; }
    #botonInstalar { background: linear-gradient(90deg, #ff9500, #ffcc00); display: none; }
</style>
</head>
<body>

    <img src="https://i.imgur.com/Bp36iz0.jpeg" class="logo" alt="Logo">
    <h1>Radio Consecuente</h1>
    
    <button class="btn" id="btnPlay">CONECTAR SEÑAL</button>
    <button class="btn" id="botonInstalar">📲 INSTALAR APP</button>

    <audio id="audio" src="https://stream.espora.org/enlaceconsecuente1"></audio>

    <script>
        // Lógica de reproducción
        document.getElementById('btnPlay').addEventListener('click', function() {
            document.getElementById('audio').play();
        });

        // Lógica de instalación profesional
        let eventoInstalar = null;
        window.addEventListener("beforeinstallprompt", e => {
            e.preventDefault();
            eventoInstalar = e;
            document.getElementById("botonInstalar").style.display = "block";
        });

        document.getElementById("botonInstalar").addEventListener("click", () => {
            if (eventoInstalar) {
                eventoInstalar.prompt();
                eventoInstalar = null;
                document.getElementById("botonInstalar").style.display = "none";
            }
        });
    </script>
</body>
</html>
