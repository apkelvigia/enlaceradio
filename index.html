<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Radio Consecuente 107.5 FM</title>
<link rel="manifest" href="manifest.json">
<style>
    * {margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif;}
    body { background: #0a0a1a; color: #fff; padding: 12px; }
    .contenedor { max-width: 460px; margin: auto; text-align: center; }
    .reproductor { background: linear-gradient(180deg, #101022, #1a1a36); border-radius: 20px; padding: 16px; border: 1px solid rgba(0, 210, 255, 0.2); box-shadow: 0 0 16px rgba(0, 210, 255, 0.15); }
    .logo-reproductor { width: 100px; height: 100px; border-radius: 50%; border: 2px solid #00d2ff; object-fit: cover; animation: girarLogo 12s linear infinite; }
    @keyframes girarLogo { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .barras-sonido { display: flex; justify-content: center; align-items: end; gap: 5px; height: 28px; margin: 15px 0; }
    .barra { width: 5px; height: 20px; background: #00d2ff; animation: subirBajar 1s ease infinite alternate; }
    @keyframes subirBajar { 0% { height: 5px; } 100% { height: 25px; } }
    .btn { background: linear-gradient(135deg, #0088ff, #00d2ff); color: #fff; border: none; padding: 15px; border-radius: 50px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 15px; }
    #botonInstalar { background: linear-gradient(90deg, #ff9500, #ffcc00); display: none; }
</style>
</head>
<body>

<div class="contenedor">
    <div class="reproductor">
        <img class="logo-reproductor" src="https://i.imgur.com/Bp36iz0.jpeg">
        <div class="barras-sonido">
            <div class="barra"></div><div class="barra" style="animation-delay: 0.2s;"></div><div class="barra" style="animation-delay: 0.4s;"></div>
        </div>
        <button class="btn" id="btnPlay">CONECTAR ENLACE</button>
        <button class="btn" id="botonInstalar">📲 INSTALAR APLICACIÓN</button>
    </div>
    <audio id="audio" src="https://stream.espora.org/enlaceconsecuente1"></audio>
</div>

<script>
    const audio = document.getElementById('audio');
    const btnPlay = document.getElementById('btnPlay');
    
    btnPlay.addEventListener('click', () => {
        audio.play();
        btnPlay.style.display = 'none';
    });

    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        document.getElementById('botonInstalar').style.display = 'block';
    });

    document.getElementById('botonInstalar').addEventListener('click', () => {
        if (deferredPrompt) {
            deferredPrompt.prompt();
            deferredPrompt.userChoice.then(() => { deferredPrompt = null; });
        }
    });
</script>
</body>
</html>
