<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Enlace Consecuente</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" sizes="512x512" href="https://i.imgur.com/Bp36iz0.jpeg">
<meta name="theme-color" content="#07142e">

<style>
    * {margin: 0; padding: 0; box-sizing: border-box;}
    body { 
        background: #07142e; 
        color: #fff; 
        font-family: Arial, sans-serif; 
        display: flex; 
        flex-direction: column; 
        align-items: center; 
        justify-content: center; 
        min-height: 100vh; 
        padding: 25px; 
    }

    .logo { 
        width: 160px; 
        border-radius: 50%; 
        border: 3px solid #00d2ff; 
        margin-bottom: 25px; 
        box-shadow: 0 0 25px rgba(0,210,255,0.4); 
    }

    h1 { 
        font-size: 28px; 
        text-transform: uppercase; 
        background: linear-gradient(90deg, #00d2ff, #7b2ffd);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        margin-bottom: 20px;
        letter-spacing: 1px;
    }

    /* 📜 Texto deslizante */
    .texto-deslizante {
        width: 100%;
        max-width: 350px;
        white-space: nowrap;
        overflow: hidden;
        margin-bottom: 30px;
        height: 22px;
    }

    .texto-deslizante span {
        display: inline-block;
        padding-left: 100%;
        animation: deslizar 22s linear infinite;
        color: #a0d8ff;
        font-size: 14px;
        letter-spacing: 0.5px;
    }

    @keyframes deslizar {
        0% { transform: translateX(0); }
        100% { transform: translateX(-100%); }
    }

    #btnPlay { 
        background: #00d2ff; 
        color: #000; 
        border: none; 
        padding: 18px 40px; 
        border-radius: 12px; 
        font-weight: bold; 
        font-size: 22px; 
        cursor: pointer; 
        min-width: 200px;
        box-shadow: 0 0 15px rgba(0,210,255,0.4);
        transition: transform 0.2s;
    }

    #btnPlay:active { transform: scale(0.97); }

    #botonInstalar { 
        background: linear-gradient(90deg, #ff9500, #ffcc00); 
        color: #000; 
        border: none; 
        padding: 12px 28px; 
        border-radius: 10px; 
        font-weight: bold; 
        font-size: 16px; 
        cursor: pointer; 
        margin-top: 20px; 
        display: none; 
        box-shadow: 0 0 12px rgba(255,204,0,0.3);
    }
</style>
</head>
<body>

    <img src="https://i.imgur.com/Bp36iz0.jpeg" class="logo" alt="Logo Enlace Consecuente">
    <h1>ENLACE CONSECUENTE</h1>

    <!-- Texto que va pasando -->
    <div class="texto-deslizante">
        <span>📡 Probando señal • Señal saliendo bien • Transmitiendo en vivo • Enlace Consecuente • Conexión estable • Siempre conectado</span>
    </div>

    <button id="btnPlay">▶ PLAY</button>
    <button id="botonInstalar">📲 INSTALAR APP</button>

    <!-- ✅ Formato correcto, HTTPS, reproductor estándar -->
    <audio id="reproductor" preload="metadata" crossorigin="anonymous">
        <source src="https://stream.espora.org/enlaceconsecuente1" type="audio/mpeg">
        <source src="https://radios.yanapak.org/enlaceconsecuente" type="audio/mpeg">
    

    <script>
        const audio = document.getElementById("reproductor");
        const btnPlay = document.getElementById("btnPlay");
        let reproduciendo = false;
        let intentoReconexion = null;

        // Botón de control simple
        btnPlay.addEventListener("click", () => {
            if (!reproduciendo) {
                audio.load();
                audio.play()
                    .then(() => {
                        reproduciendo = true;
                        btnPlay.textContent = "⏸ PAUSA";
                    })
                    .catch(err => console.log("Info inicio:", err));
            } else {
                reproduciendo = false;
                audio.pause();
                btnPlay.textContent = "▶ PLAY";
                clearTimeout(intentoReconexion);
            }
        });

        // 🔄 Reconexión automática segura
        function reconectar() {
            if (!reproduciendo) return;
            intentoReconexion = setTimeout(() => {
                audio.load();
                audio.play().catch(() => reconectar());
            }, 2000);
        }

        audio.addEventListener("error", reconectar);
        audio.addEventListener("stalled", reconectar);
        audio.addEventListener("waiting", reconectar);

        // 📲 Instalación
        let eventoInstalar = null;
        window.addEventListener("beforeinstallprompt", e => {
            e.preventDefault();
            eventoInstalar = e;
            document.getElementById("botonInstalar").style.display = "block";
        });

        document.getElementById("botonInstalar").addEventListener("click", () => {
            if (eventoInstalar) eventoInstalar.prompt();
        });
    </script>

</body>
</html>
