<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="icon" sizes="192x192" href="https://i.imgur.com/Bp36iz0.jpeg">
<link rel="icon" sizes="512x512" href="https://i.imgur.com/Bp36iz0.jpeg">
<link rel="apple-touch-icon" href="https://i.imgur.com/Bp36iz0.jpeg">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enlace a Radio Consecuente</title>

<link rel="manifest" href="manifest.json">
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('/service-worker.js');
  });
}
</script>

<meta name="theme-color" content="#07142e">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#07142e;padding:10px;padding-bottom:90px;}
.contenedor{max-width:450px;margin:auto;background:linear-gradient(180deg,#07142e,#0f2a55,#07142e);border-radius:24px;box-shadow:0 15px 35px rgba(0,0,0,0.5);padding:25px;text-align:center;border:1px solid rgba(255,255,255,0.05)}

/* LOGO con movimiento propio: sube y baja, NO gira */
.logo-radio{width:100%;max-width:220px;height:auto;border-radius:50%;box-shadow:0 0 30px rgba(0,210,255,0.4);margin-bottom:25px;border:3px solid #00d2ff;
animation: subeBaja 6s ease-in-out infinite alternate, brillo 3s ease-in-out infinite alternate;}
@keyframes subeBaja {from{transform: translateY(0) scale(1);} to{transform: translateY(-5px) scale(1.02);}}
@keyframes brillo {from{box-shadow:0 0 25px rgba(0,210,255,0.4);} to{box-shadow:0 0 40px rgba(123,47,253,0.6);}}

h1{color:#fff;font-size:26px;margin-bottom:8px;letter-spacing:1px;text-transform:uppercase;text-shadow:0 2px 4px rgba(0,0,0,0.5);
background: linear-gradient(90deg, #00d2ff, #7b2ffd); -webkit-background-clip: text; background-clip: text; color: transparent;}
.subtitulo{color:#b4d6ff;font-size:16px;font-weight:normal;margin-bottom:25px;}

/* REPRODUCTOR SIMPLE */
.reproductor-caja{background:rgba(255,255,255,0.03);border-radius:16px;padding:25px 20px;margin-bottom:25px;border:1px solid rgba(0,210,255,0.2);}

.estado{font-size:18px; color:#fff; margin-bottom:20px; min-height:30px;}

.barras-conexion{display:flex; justify-content:center; gap:8px; align-items:flex-end; height:40px; margin-bottom:25px; opacity:0; transition:opacity 0.4s;}
.conectado .barras-conexion{opacity:1;}
.barra{width:8px; border-radius:4px; background:linear-gradient(#00d2ff, #7b2ffd); box-shadow:0 0 8px #00d2ff;}
.barra:nth-child(1){animation: pulso 1.1s infinite alternate;}
.barra:nth-child(2){animation: pulso 1.1s 0.2s infinite alternate;}
.barra:nth-child(3){animation: pulso 1.1s 0.4s infinite alternate;}
.barra:nth-child(4){animation: pulso 1.1s 0.6s infinite alternate;}
.barra:nth-child(5){animation: pulso 1.1s 0.8s infinite alternate;}
@keyframes pulso {from{height:8px;} to{height:32px;}}

.boton-play{width:70px; height:70px; border-radius:50%; border:none; background:linear-gradient(135deg, #0088ff, #7b2ffd); color:#fff; font-size:28px; cursor:pointer; box-shadow:0 0 20px rgba(0,210,255,0.5); transition:transform 0.2s;}
.boton-play:active{transform:scale(0.95);}

.texto-ayuda{color:#8a99ad;font-size:13px;margin-top:20px;line-height:1.6;background:rgba(0,0,0,0.2);padding:14px;border-radius:10px}

.sello-vigia{color:#00d2ff;font-size:12px;margin-top:20px;padding:12px;border-top:1px solid rgba(0,210,255,0.2);text-align:center;}

.boton-instalar-nuevo{display:none;position:fixed;bottom:15px;left:50%;transform:translateX(-50%);background:#ffcc00;color:#000;border:none;padding:15px 35px;font-size:15px;font-weight:bold;border-radius:50px;cursor:pointer;box-shadow:0 8px 20px rgba(255,204,0,0.4);z-index:9999;animation:latido 2s infinite;letter-spacing:1px;text-transform:uppercase}
@keyframes latido{0%{transform:translateX(-50%) scale(1)}50%{transform:translateX(-50%) scale(1.05);box-shadow:0 8px 25px rgba(255,204,0,0.6)}100%{transform:translateX(-50%) scale(1)}}
</style>
</head>
<body>

<div class="contenedor">
    <img class="logo-radio" src="https://i.imgur.com/Bp36iz0.jpeg" alt="Enlace Radio Consecuente">
    <h1>ENLACE A RADIO CONSECUENTE</h1>
    <div class="subtitulo">Transmisión estable · Solo uso técnico</div>

    <div class="reproductor-caja" id="bloqueConectado">
        <div class="estado" id="textoEstado">Listo para iniciar conexión</div>
        <div class="barras-conexion" id="barras">
            <div class="barra"></div><div class="barra"></div><div class="barra"></div><div class="barra"></div><div class="barra"></div>
        </div>
        <button class="boton-play" id="btnPlay">▶</button>
        <audio id="reproductor" preload="none">
    </div>

    <div class="texto-ayuda">
        📲 Instalación: Abrir en navegador Chrome → 3 puntitos → <b>Agregar a pantalla de inicio</b><br>
        ⚡ Enlace exclusivo para transmisión y chequeo de señal
    </div>

    <div class="sello-vigia">
        🔧 Enlace Técnico - El Vigía<br>
        Solo para uso autorizado
    </div>
</div>

<button id="botonInstalar" class="boton-instalar-nuevo">📲 INSTALAR ENLACE</button>

<script>
// 📡 TUS ENLACES EXACTOS
const enlaces = [
    "https://stream.espora.org/enlaceconsecuente1",
    "https://radios.yanapak.org/enlaceconsecuente"
];
let enlaceActivo = 0;
let volumen = 0.95;

const audio = document.getElementById('reproductor');
const textoEstado = document.getElementById('textoEstado');
const barras = document.getElementById('barras');
const bloqueConectado = document.getElementById('bloqueConectado');
const btnPlay = document.getElementById('btnPlay');

let eventoInstalar;
const botonInstalar = document.getElementById('botonInstalar');

// ✅ MISMA LÓGICA DE INSTALACIÓN QUE LA BASE QUE FUNCIONA
window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    eventoInstalar = e;
    botonInstalar.style.display = 'block';
});

botonInstalar.addEventListener('click', async () => {
    if (!eventoInstalar) {
        alert('👉 Abrir en Chrome: Menú → Agregar a pantalla de inicio');
        return;
    }
    const resultado = await eventoInstalar.prompt();
    if (resultado.outcome === 'accepted') {
        botonInstalar.style.display = 'none';
        eventoInstalar = null;
    }
});

// CARGAR SEÑAL
function cargarEnlace() {
    audio.src = enlaces[enlaceActivo];
    audio.load();
    textoEstado.textContent = enlaceActivo === 0 
        ? "🔄 Conectando señal principal..." 
        : "⚠️ Usando enlace de respaldo";
}

// SI FALLA CAMBIA AUTOMÁTICAMENTE
audio.addEventListener('error', () => {
    if (enlaceActivo === 0) {
        enlaceActivo = 1;
        setTimeout(cargarEnlace, 1500);
    }
});

// CUANDO CONECTA
audio.addEventListener('playing', () => {
    textoEstado.textContent = "✅ ENLACE ESTABLE - Transmitiendo";
    barras.style.opacity = "1";
    btnPlay.textContent = "⏸";
});

audio.addEventListener('pause', () => {
    textoEstado.textContent = "Pausado - Listo para reconectar";
    barras.style.opacity = "0";
    btnPlay.textContent = "▶";
});

// VOLVER A PROBAR LA SEÑAL PRINCIPAL CADA 3 MINUTOS
setInterval(() => {
    if (enlaceActivo !== 0 && !audio.paused) {
        textoEstado.textContent = "🔍 Probando volver a señal principal...";
        const respaldo = enlaceActivo;
        enlaceActivo = 0;
        cargarEnlace();
        audio.play().catch(() => {
            enlaceActivo = respaldo;
            cargarEnlace();
            audio.play().catch(()=>{});
        });
    }
}, 180000);

// CONTROL PRINCIPAL
btnPlay.addEventListener('click', () => {
    if (audio.paused) {
        cargarEnlace();
        audio.play().catch(() => textoEstado.textContent = "Tocá nuevamente para confirmar conexión");
    } else {
        audio.pause();
    }
});

audio.volume = volumen;

</script>

</body>
</html>
