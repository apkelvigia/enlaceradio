<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enlace a Radio Consecuente</title>
<link rel="icon" sizes="192x192" href="https://i.imgur.com/Bp36iz0.jpeg">
<link rel="icon" sizes="512x512" href="https://i.imgur.com/Bp36iz0.jpeg">
<link rel="apple-touch-icon" href="https://i.imgur.com/Bp36iz0.jpeg">
<link rel="manifest" href="manifest.json">
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('/service-worker.js'));
}
</script>
<meta name="theme-color" content="#07142e">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#07142e;padding:10px}
.contenedor{max-width:450px;margin:auto;background:#0f2a55;border-radius:24px;padding:30px;text-align:center}
.logo-radio{width:200px;height:200px;border-radius:50%;margin-bottom:25px}
h1{color:#fff;font-size:24px;margin-bottom:30px;text-transform:uppercase}
.boton-play{width:70px;height:70px;border-radius:50%;border:none;background:#0088ff;color:#fff;font-size:28px;cursor:pointer}
.boton-play:hover{transform:scale(1.05)}
#botonInstalar{display:none;margin-top:25px;padding:10px 20px;border-radius:20px;border:none;background:#ffcc00;color:#000;font-weight:bold}
</style>
</head>
<body>

<div class="contenedor">
  <img class="logo-radio" src="https://i.imgur.com/Bp36iz0.jpeg" alt="Logo">
  <h1>ENLACE A RADIO CONSECUENTE</h1>
  <button id="btnPlay" class="boton-play">▶</button>
  <!-- ✅ ETIQUETA AUDIO BIEN CERRADA AQUÍ -->
  <audio id="reproductor" preload="auto" crossorigin="anonymous">
  <button id="botonInstalar">📲 INSTALAR</button>
</div>

<script>
const enlaces = [
  "https://stream.espora.org/enlaceconsecuente1",
  "https://radios.yanapak.org/enlaceconsecuente"
];
let activo = 0;
let intentos = 0;
let reconectando = false;

const audio = document.getElementById('reproductor');
const btnPlay = document.getElementById('btnPlay');
let eventoInstalar;

// Sistema instalación
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault(); eventoInstalar = e;
  document.getElementById('botonInstalar').style.display = 'block';
});
document.getElementById('botonInstalar').addEventListener('click', () => eventoInstalar?.prompt());

// Cargar y reproducir
function arrancar() {
  audio.src = enlaces[activo];
  audio.load();
  audio.play().then(() => {
    intentos = 0; reconectando = false;
    btnPlay.textContent = "⏸";
  }).catch(() => intentos < 6 && setTimeout(reconectar, 800));
}

// ✅ RECONEXIÓN 100% AUTOMÁTICA
function reconectar() {
  if (reconectando) return; reconectando = true;
  intentos++;
  activo = activo === 0 ? 1 : 0;
  arrancar();
}

// Disparadores si se corta o traba
audio.addEventListener('error', reconectar);
audio.addEventListener('stalled', reconectar);
audio.addEventListener('waiting', reconectar);

// Si por error pasa a pausa sola, lo levanta
audio.addEventListener('pause', () => {
  if (!audio.ended && !reconectando && btnPlay.textContent === "⏸") {
    setTimeout(() => audio.paused && arrancar(), 600);
  }
});

// Botón solo para control manual
btnPlay.addEventListener('click', () => {
  if (audio.paused) arrancar();
  else { audio.pause(); btnPlay.textContent = "▶"; }
});

audio.volume = 0.95;
</script>

</body>
</html>
